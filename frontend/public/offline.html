<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Connection — Hydrotherapy System</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a5c99 0%, #063d6b 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #ffffff;
        padding: 32px;
        text-align: center;
      }

      .icon {
        width: 96px;
        height: 96px;
        margin-bottom: 28px;
        opacity: 0.9;
      }

      h1 {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
      }

      p {
        font-size: 16px;
        line-height: 1.65;
        max-width: 380px;
        opacity: 0.82;
        margin-bottom: 36px;
      }

      .btn {
        display: inline-block;
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.55);
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        padding: 13px 36px;
        text-decoration: none;
        transition: background 0.2s;
        backdrop-filter: blur(4px);
      }

      .btn:hover { background: rgba(255, 255, 255, 0.25); }

      .app-name {
        margin-top: 48px;
        font-size: 13px;
        opacity: 0.45;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- No-wifi SVG icon -->
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="2" x2="22" y2="22" />
      <path d="M8.5 16.5a5 5 0 0 1 7 0" />
      <path d="M5 13a10 10 0 0 1 5.17-2.83" />
      <path d="M19 13a10 10 0 0 0-2.24-1.54" />
      <path d="M2 8.82a15 15 0 0 1 4.17-2.65" />
      <path d="M22 8.82A15 15 0 0 0 8.93 6.33" />
      <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none" />
    </svg>

    <h1>You're Offline</h1>
    <p>
      Please check your internet connection and try again.<br />
      The app will work normally once you're back online.
    </p>

    <button class="btn" onclick="window.location.reload()">Try Again</button>

    <p class="app-name">Hydrotherapy System</p>
  </body>
</html>
